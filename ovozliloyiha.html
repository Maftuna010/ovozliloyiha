<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Ovozli Yordamchi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, #0f172a, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #38bdf8;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .status {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .mic-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #38bdf8;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .mic-btn.listening {
            animation: pulse 1.2s infinite;
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
        }

        .mic-icon {
            font-size: 45px;
            fill: white;
        }

        #output {
            margin-top: 40px;
            font-size: 22px;
            font-weight: 500;
            color: #f59e0b;
            min-height: 40px;
            text-align: center;
            max-width: 80%;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }

        .commands-list {
            margin-top: 40px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            line-height: 1.8;
            color: #cbd5e1;
        }

        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 25px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <h1>AI SMART ASSISTANT</h1>
    <div class="status" id="status">Tugmani bosing va buyruq bering</div>

    <button class="mic-btn" id="micBtn">
        <svg class="mic-icon" viewBox="0 0 24 24" width="45" height="45">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
        </svg>
    </button>

    <div id="output">...</div>

    <div class="commands-list">
        <strong>Aqlli buyruqlar namunalari:</strong><br>
        • "YouTube" <span class="status">(Asosiy sahifani ochadi)</span><br>
        • "YouTube <span class="highlight">Shahlo Salayeva</span>" <span class="status">(Youtubedan avtomatik qidiradi)</span><br>
        • "Google <span class="highlight">O'zbekiston yangiliklari</span>" <span class="status">(Googledan qidiradi)</span><br>
        • "Telegram" 
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Sizning brauzeringiz ovozli boshqaruvni qo'llab-quvvatlamaydi. Google Chrome-dan foydalaning.");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'uz-UZ'; 
            recognition.continuous = false; 
            recognition.interimResults = false; 

            const micBtn = document.getElementById('micBtn');
            const statusText = document.getElementById('status');
            const outputText = document.getElementById('output');

            micBtn.addEventListener('click', () => {
                if (micBtn.classList.contains('listening')) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });

            recognition.onstart = () => {
                micBtn.classList.add('listening');
                statusText.innerText = "Eshityapman... Gapiring...";
                outputText.innerText = "...";
            };

            recognition.onend = () => {
                micBtn.classList.remove('listening');
                statusText.innerText = "Tugmani bosing va buyruq bering";
            };

            recognition.onresult = (event) => {
                // Eshitilgan gapni matnga aylantirish va bo'shliqlarni tozalash
                const textResult = event.results[0][0].transcript.toLowerCase().trim();
                outputText.innerText = `Siz aytdingiz: "${textResult}"`;

                // --- 1. YOUTUBE INTEGRATSIYASI ---
                if (textResult.startsWith('youtube') || textResult.startsWith('yutub')) {
                    // Gap boshidagi 'youtube' yoki 'yutub' so'zini kesib tashlab, qidirilayotgan matnni ajratib olish
                    const searchQuery = textResult.replace(/^(youtube|yutub)\s*/, '').trim();

                    if (searchQuery.length > 0) {
                        statusText.innerText = `YouTubedan "${searchQuery}" qidirilmoqda...`;
                        setTimeout(() => {
                            // YouTube qidiruv URL manziliga yo'naltirish
                            window.location.href = `https://www.youtube.com/results?search_query=${encodeURIComponent(searchQuery)}`;
                        }, 1200);
                    } else {
                        statusText.innerText = "YouTube bosh sahifasi ochilmoqda...";
                        setTimeout(() => { window.location.href = 'https://www.youtube.com'; }, 1000);
                    }
                } 
                // --- 2. GOOGLE INTEGRATSIYASI ---
                else if (textResult.startsWith('google') || textResult.startsWith('gugl')) {
                    const searchQuery = textResult.replace(/^(google|gugl)\s*/, '').trim();

                    if (searchQuery.length > 0) {
                        statusText.innerText = `Googledan "${searchQuery}" qidirilmoqda...`;
                        setTimeout(() => {
                            window.location.href = `https://www.google.com/search?q=${encodeURIComponent(searchQuery)}`;
                        }, 1200);
                    } else {
                        statusText.innerText = "Google bosh sahifasi ochilmoqda...";
                        setTimeout(() => { window.location.href = 'https://www.google.com'; }, 1000);
                    }
                } 
                // --- 3. ODDIY ILOVALAR ---
                else if (textResult.includes('telegram')) {
                    statusText.innerText = "Telegram ochilmoqda...";
                    setTimeout(() => { window.location.href = 'https://web.telegram.org'; }, 1000);
                } 
                else {
                    statusText.innerText = "Buyruq tushunarsiz. Ro'yxatdagi namunalardek aytib ko'ring.";
                }
            };

            recognition.onerror = (event) => {
                statusText.innerText = "Xatolik yuz berdi: " + event.error;
                micBtn.classList.remove('listening');
            };
        }
    </script>
</body>
</html>
